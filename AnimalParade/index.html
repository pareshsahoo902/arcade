<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Parade</title>
    <style>
        :root {
            --ui-font: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            --primary-bg: #87CEEB;
            --button-color: #FFD700;
            --button-text: #4B0082;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--primary-bg);
            font-family: var(--ui-font);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .ui-panel {
            pointer-events: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text);
            border: 4px solid white;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .round-btn {
            width: 70px;
            height: 70px;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            border-radius: 50%;
        }

        #menu-screen {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .title {
            font-size: 64px;
            color: #FF4500;
            margin-bottom: 40px;
            text-shadow: 3px 3px 0 white, -3px -3px 0 white, 3px -3px 0 white, -3px 3px 0 white;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        #prompt-container {
            position: absolute;
            top: 100px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 50;
        }

        .prompt-bubble {
            display: inline-block;
            background: white;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 38px;
            border: 8px solid #FFD700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-overlay">
        <div class="top-bar ui-panel">
            <button id="btn-home" class="btn round-btn">🏠</button>
            <button id="btn-music" class="btn round-btn">🎵</button>
        </div>

        <div id="prompt-container" class="hidden">
            <div class="prompt-bubble" id="prompt-text">Tap the Dog!</div>
        </div>
    </div>

    <div id="menu-screen">
        <h1 class="title">Animal Parade</h1>
        <div class="ui-panel" style="display:flex; flex-direction:column; gap:20px;">
            <button id="btn-mode-sound" class="btn">Sound Match 🔊</button>
            <button id="btn-mode-color" class="btn">Color Match 🎨</button>
            <button id="btn-mode-free" class="btn">Free Play 🐾</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuScreen = document.getElementById('menu-screen');
    const promptContainer = document.getElementById('prompt-container');
    const promptText = document.getElementById('prompt-text');

    const COLORS = {
        sky: '#87CEEB',
        grass: '#7CFC00',
        path: '#D2B48C',
        sun: '#FFD700',
        cloud: '#FFFFFF'
    };

    const GAME_STATE = {
        MENU: 'MENU',
        PLAYING: 'PLAYING',
        REWARD: 'REWARD'
    };

    const GAME_MODE = {
        SOUND: 'SOUND',
        COLOR: 'COLOR',
        FREE: 'FREE'
    };

    const ANIMAL_TYPES = {
        COW: { name: 'Cow', sound: 'moo', color: '#FFFFFF', accent: '#000000' },
        DOG: { name: 'Dog', sound: 'bark', color: '#8B4513', accent: '#D2B48C' },
        CAT: { name: 'Cat', sound: 'meow', color: '#FFA500', accent: '#FFFFFF' },
        DUCK: { name: 'Duck', sound: 'quack', color: '#FFFF00', accent: '#FFA500' }
    };

    let currentState = GAME_STATE.MENU;
    let currentMode = GAME_MODE.FREE;
    let width, height;
    let lastTime = 0;
    let animals = [];
    let particles = [];
    let clouds = [];
    let currentTarget = null;
    let isMusicPlaying = false;
    let audioCtx = null;
    let musicInterval = null;

    const SOUNDS = {
        moo: [220, 110, 150, 100],
        bark: [300, 400, 200],
        meow: [600, 800, 700],
        quack: [400, 350, 400],
        correct: [523, 659, 783, 1046],
        wrong: [200, 150]
    };

    const SoundManager = {
        init() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },
        playAnimalSound(type) {
            this.init();
            const sound = SOUNDS[ANIMAL_TYPES[type].sound];
            this.playToneSequence(sound, 0.1, 'sawtooth');
        },
        playEffect(effect) {
            this.init();
            const sound = SOUNDS[effect];
            this.playToneSequence(sound, 0.1, 'sine');
        },
        playToneSequence(freqs, duration, type) {
            let time = audioCtx.currentTime;
            freqs.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + duration);
                time += duration;
            });
        },
        speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.2;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        },
        toggleMusic() {
            this.init();
            if (isMusicPlaying) {
                this.startMusic();
            } else {
                this.stopMusic();
            }
        },
        startMusic() {
            if (musicInterval) return;
            const tempo = 120;
            const quarterNote = 60 / tempo;
            const melody = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5

            musicInterval = setInterval(() => {
                if (!isMusicPlaying) return;
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                const freq = melody[Math.floor((audioCtx.currentTime / quarterNote) % melody.length)];
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                noteGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                noteGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + quarterNote * 0.8);
                osc.connect(noteGain);
                noteGain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + quarterNote * 0.8);
            }, quarterNote * 1000);
        },
        stopMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
        }
    };

    class Animal {
        constructor(type, x, y, scale) {
            this.type = type;
            this.x = x;
            this.y = y;
            this.scale = scale;
            this.bob = 0;
            this.bounce = 0;
            this.shake = 0;
            this.rotation = 0;
            this.state = 'IDLE';
            this.animTimer = 0;
        }
        update(deltaTime) {
            this.animTimer += deltaTime * 0.005;
            this.bob = Math.sin(this.animTimer * 2) * 5;
            if (this.state === 'BOUNCE') {
                this.bounce = Math.abs(Math.sin(this.animTimer * 10)) * 30;
                if (this.animTimer > this.stateEnd) this.state = 'IDLE';
            } else if (this.state === 'SHAKE') {
                this.shake = Math.sin(this.animTimer * 30) * 10;
                if (this.animTimer > this.stateEnd) this.state = 'IDLE';
            } else if (this.state === 'DANCE') {
                this.bounce = Math.abs(Math.sin(this.animTimer * 10)) * 20;
                this.rotation = Math.sin(this.animTimer * 10) * 0.2;
                if (this.animTimer > this.stateEnd) {
                    this.state = 'IDLE';
                    this.rotation = 0;
                }
            } else {
                this.bounce = 0;
                this.shake = 0;
                this.rotation = 0;
            }
        }
        trigger(state, duration = 2) {
            this.state = state;
            this.stateEnd = this.animTimer + duration;
        }
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x + this.shake, this.y - this.bob - this.bounce);
            ctx.scale(this.scale, this.scale);
            ctx.rotate(this.rotation);
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(0, 40, 40, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            const t = ANIMAL_TYPES[this.type];
            if (this.type === 'COW') this.drawCow(ctx, t);
            else if (this.type === 'DOG') this.drawDog(ctx, t);
            else if (this.type === 'CAT') this.drawCat(ctx, t);
            else if (this.type === 'DUCK') this.drawDuck(ctx, t);
            ctx.restore();
        }
        drawCow(ctx, t) {
            ctx.fillStyle = t.color;
            this.roundRect(ctx, -50, -30, 100, 70, 20, true);
            ctx.fillStyle = t.accent;
            ctx.beginPath(); ctx.arc(-20, -10, 15, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, 15, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = t.color;
            this.roundRect(ctx, 30, -50, 50, 50, 15, true);
            ctx.fillStyle = '#FFC0CB';
            this.roundRect(ctx, 45, -25, 45, 25, 10, true);
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(60, -35, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#F5F5DC';
            ctx.beginPath(); ctx.moveTo(40, -50); ctx.lineTo(35, -65); ctx.lineTo(50, -50); ctx.fill();
            ctx.beginPath(); ctx.moveTo(70, -50); ctx.lineTo(75, -65); ctx.lineTo(60, -50); ctx.fill();
        }
        drawDog(ctx, t) {
            ctx.fillStyle = t.color;
            this.roundRect(ctx, -40, -20, 80, 60, 20, true);
            this.roundRect(ctx, 20, -50, 50, 50, 15, true);
            ctx.fillStyle = t.accent;
            this.roundRect(ctx, 15, -55, 15, 30, 5, true);
            this.roundRect(ctx, 60, -55, 15, 30, 5, true);
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(45, -35, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(65, -35, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(55, -20, 5, 0, Math.PI*2); ctx.fill();
        }
        drawCat(ctx, t) {
            ctx.fillStyle = t.color;
            this.roundRect(ctx, -35, -20, 70, 60, 25, true);
            this.roundRect(ctx, -10, -55, 50, 45, 15, true);
            ctx.beginPath(); ctx.moveTo(-5, -55); ctx.lineTo(5, -75); ctx.lineTo(15, -55); ctx.fill();
            ctx.beginPath(); ctx.moveTo(25, -55); ctx.lineTo(35, -75); ctx.lineTo(45, -55); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(10, -40, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(30, -40, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(10, -40, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(30, -40, 3, 0, Math.PI*2); ctx.fill();
        }
        drawDuck(ctx, t) {
            ctx.fillStyle = t.color;
            this.roundRect(ctx, -40, -10, 80, 50, 20, true);
            ctx.beginPath(); ctx.arc(30, -20, 25, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = t.accent;
            this.roundRect(ctx, 45, -25, 25, 15, 5, true);
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(40, -25, 3, 0, Math.PI*2); ctx.fill();
        }
        roundRect(ctx, x, y, width, height, radius, fill) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            if (fill) ctx.fill();
            else ctx.stroke();
        }
        isHit(mx, my) {
            const dx = mx - this.x;
            const dy = my - this.y;
            return (Math.abs(dx) < 60 * this.scale && dy > -80 * this.scale && dy < 40 * this.scale);
        }
    }

    function init() {
        resize();
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        }, { passive: false });
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * width,
                y: Math.random() * (height * 0.4),
                speed: 0.2 + Math.random() * 0.5,
                scale: 0.5 + Math.random() * 1.5
            });
        }
        requestAnimationFrame(gameLoop);
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        if (animals.length > 0) {
            animals.forEach((animal, i) => {
                animal.x = width * (0.25 + i * 0.25);
                animal.y = height * 0.75 - (i % 2) * 40;
                animal.scale = 0.8 + (animal.y / height) * 0.5;
            });
        }
    }

    function drawSky() {
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, '#87CEEB');
        grad.addColorStop(0.5, '#E0F6FF');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
    }

    function drawClouds() {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        clouds.forEach(cloud => {
            cloud.x += cloud.speed;
            if (cloud.x > width + 100) cloud.x = -100;
            ctx.beginPath();
            ctx.arc(cloud.x, cloud.y, 30 * cloud.scale, 0, Math.PI * 2);
            ctx.arc(cloud.x + 40 * cloud.scale, cloud.y, 40 * cloud.scale, 0, Math.PI * 2);
            ctx.arc(cloud.x + 80 * cloud.scale, cloud.y, 30 * cloud.scale, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawGround() {
        ctx.fillStyle = COLORS.grass;
        ctx.fillRect(0, height * 0.5, width, height * 0.5);
        ctx.fillStyle = COLORS.path;
        ctx.beginPath();
        ctx.moveTo(width * 0.2, height);
        ctx.lineTo(width * 0.4, height * 0.5);
        ctx.lineTo(width * 0.6, height * 0.5);
        ctx.lineTo(width * 0.8, height);
        ctx.fill();
    }

    function spawnAnimals() {
        animals = [];
        const types = Object.keys(ANIMAL_TYPES);
        const shuffled = types.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 3);
        selected.forEach((type, i) => {
            const x = width * (0.25 + i * 0.25);
            const y = height * 0.75 - (i % 2) * 40;
            const scale = 0.8 + (y / height) * 0.5;
            animals.push(new Animal(type, x, y, scale));
        });
        if (currentMode !== GAME_MODE.FREE) {
            currentTarget = animals[Math.floor(Math.random() * animals.length)];
            updatePrompt();
        }
    }

    function updatePrompt() {
        if (!currentTarget) return;
        let text = "";
        if (currentMode === GAME_MODE.SOUND) {
            text = `Which one goes "${ANIMAL_TYPES[currentTarget.type].sound}"?`;
        } else if (currentMode === GAME_MODE.COLOR) {
            text = `Tap the ${ANIMAL_TYPES[currentTarget.type].name}!`;
        }
        promptText.innerText = text;
        SoundManager.speak(text);
    }

    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const mx = clientX - rect.left;
        const my = clientY - rect.top;
        if (currentState !== GAME_STATE.PLAYING) return;
        const sorted = [...animals].sort((a, b) => b.y - a.y);
        for (let animal of sorted) {
            if (animal.isHit(mx, my)) {
                onAnimalTap(animal);
                break;
            }
        }
    }

    function onAnimalTap(animal) {
        SoundManager.playAnimalSound(animal.type);
        if (currentMode === GAME_MODE.FREE) {
            animal.trigger('BOUNCE');
            return;
        }
        if (animal === currentTarget) {
            animal.trigger('DANCE', 3);
            SoundManager.playEffect('correct');
            currentState = GAME_STATE.REWARD;
            createCelebration();
            setTimeout(nextLevel, 3000);
        } else {
            animal.trigger('SHAKE');
            SoundManager.playEffect('wrong');
            currentTarget.trigger('BOUNCE', 1);
        }
    }

    function createCelebration() {
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: width / 2, y: height / 2,
                vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 10,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                size: 5 + Math.random() * 10,
                life: 1.0,
                type: Math.random() > 0.5 ? 'circle' : 'star'
            });
        }
    }

    function drawStar(ctx, x, y, r, p, m) {
        ctx.save();
        ctx.beginPath();
        ctx.translate(x, y);
        ctx.moveTo(0, 0 - r);
        for (let i = 0; i < p; i++) {
            ctx.rotate(Math.PI / p);
            ctx.lineTo(0, 0 - (r * m));
            ctx.rotate(Math.PI / p);
            ctx.lineTo(0, 0 - r);
        }
        ctx.fill();
        ctx.restore();
    }

    function nextLevel() {
        if (currentState === GAME_STATE.MENU) return;
        currentState = GAME_STATE.PLAYING;
        spawnAnimals();
    }

    function gameLoop(timestamp) {
        const deltaTime = timestamp - lastTime || 0;
        lastTime = timestamp;
        ctx.clearRect(0, 0, width, height);
        drawSky();
        drawClouds();
        drawGround();
        animals.sort((a, b) => a.y - b.y);
        animals.forEach(animal => {
            animal.update(deltaTime);
            if (currentMode === GAME_MODE.COLOR && animal === currentTarget && currentState === GAME_STATE.PLAYING) {
                ctx.save();
                ctx.shadowBlur = 20; ctx.shadowColor = 'white';
                animal.draw(ctx);
                ctx.restore();
            } else {
                animal.draw(ctx);
            }
        });
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.01;
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            if (p.type === 'star') {
                drawStar(ctx, p.x, p.y, p.size, 5, 0.5);
            } else {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            if (p.life <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(gameLoop);
    }

    document.getElementById('btn-mode-sound').addEventListener('click', () => startGame(GAME_MODE.SOUND));
    document.getElementById('btn-mode-color').addEventListener('click', () => startGame(GAME_MODE.COLOR));
    document.getElementById('btn-mode-free').addEventListener('click', () => startGame(GAME_MODE.FREE));
    document.getElementById('btn-home').addEventListener('click', goHome);
    document.getElementById('btn-music').addEventListener('click', (e) => {
        isMusicPlaying = !isMusicPlaying;
        e.target.innerText = isMusicPlaying ? '🔊' : '🎵';
        SoundManager.toggleMusic();
    });

    function startGame(mode) {
        currentMode = mode;
        currentState = GAME_STATE.PLAYING;
        menuScreen.classList.add('hidden');
        if (mode !== GAME_MODE.FREE) promptContainer.classList.remove('hidden');
        else promptContainer.classList.add('hidden');
        spawnAnimals();
        SoundManager.init();
    }

    function goHome() {
        currentState = GAME_STATE.MENU;
        menuScreen.classList.remove('hidden');
        promptContainer.classList.add('hidden');
    }

    init();
</script>
</body>
</html>
